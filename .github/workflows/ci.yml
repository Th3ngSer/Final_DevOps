name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: |
          cd scratch_app
          mkdir -p src/main/resources/graphql-client
          ./mvnw clean test -Dspring.profiles.active=test

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "BUILD FAILED: ${{ github.repository }} (Job: ${{ github.job }})"
          to: ${{ github.event.head_commit.author.email }}
          cc: srengty@gmail.com
          html_body: |
            <p>Build <b>FAILED</b> for commit <b>${{ github.sha }}</b> by <b>${{ github.actor }}</b>.</p>
            <p>Please check the detailed logs at: <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">GitHub Workflow Logs</a></p>
          body: |
            Build FAILED for commit ${{ github.sha }} by ${{ github.actor }}.
            Please check the detailed logs at: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  deploy:
    needs: build-and-test
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i inventory.ini deploy.yml
