# Force Spring Boot to use an in-memory SQLite database for testing
spring.datasource.url=jdbc:sqlite::memory:mytestdb?cache=shared
spring.datasource.driver-class-name=org.sqlite.JDBC

# Use the community-supported Hibernate dialect for SQLite
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Automatically regenerate the schema tables cleanly before running tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true